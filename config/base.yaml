# Base Dignity Configuration
# This is the default configuration template

model:
  task: risk  # risk, forecast, policy
  input_size: 9
  hidden_size: 256
  n_layers: 2
  dropout: 0.1
  cnn_kernel_size: 3

data:
  source: synthetic  # synthetic, crypto, gdelt
  seq_len: 100
  batch_size: 64
  test_size: 0.2
  num_workers: 4
  features:
    - volume
    - fee_rate
    - tx_count
    - volatility
    - price_change
    - momentum
    - directional_change
    - volume_volatility
    - regime

train:
  epochs: 50
  lr: 0.0003
  weight_decay: 0.00001
  use_amp: true
  gradient_clip: 1.0
  checkpoint_dir: ./checkpoints
  log_interval: 10
  save_interval: 5

device: cuda
seed: 42
